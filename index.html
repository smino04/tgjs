<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F2F2F7">
<title>특급전사 — 체력검정 기록</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="특급전사">
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --bg:#F2F2F7; --surface:#FFFFFF; --line:#E3E3E8;
    --ink:#1C1C1E; --ink-dim:#6E6E73; --ink-faint:#AEAEB2;
    --tint:#3F4D22; --tint-bg:rgba(63,77,34,.10);
    --gold:#B8860B; --gold-bg:rgba(184,134,11,.12);
    --green:#34C759; --danger:#FF3B30;
    --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','SF Pro Display','Apple SD Gothic Neo',system-ui,sans-serif;
    color-scheme:light;
  }
  :root[data-theme="dark"]{
    --bg:#000000; --surface:#1C1C1E; --line:#333336;
    --ink:#FFFFFF; --ink-dim:#98989D; --ink-faint:#68686D;
    --tint:#9CB56C; --tint-bg:rgba(156,181,108,.16);
    --gold:#E8C05A; --gold-bg:rgba(232,192,90,.14);
    --green:#30D158; --danger:#FF453A;
    color-scheme:dark;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--font);
    line-height:1.45; -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:0 0 90px;
    transition:background-color .35s ease, color .35s ease;
  }
  .wrap{max-width:520px; margin:0 auto}
  .screens-strip{display:contents}

  .page-header{padding:0 2px 6px; padding-top:calc(env(safe-area-inset-top, 20px) + 14px)}
  .page-header h1{font-size:34px; font-weight:800; letter-spacing:-.02em; margin:0}

  .group-label{
    font-size:13px; font-weight:600; color:var(--ink-faint);
    margin:26px 4px 8px; letter-spacing:.01em;
  }

  /* ---- exercise cards (기록 tab) ---- */
  .ex-card{
    width:100%; display:flex; align-items:center; gap:18px; text-align:left;
    background:var(--surface); border:1px solid var(--line); border-radius:22px;
    padding:22px 20px; margin-bottom:14px; cursor:pointer;
    box-shadow:0 2px 10px rgba(0,0,0,.05);
    transition:background-color .3s, border-color .3s, transform .18s, box-shadow .18s;
    font-family:inherit; color:inherit;
    animation:cardIn .4s cubic-bezier(.22,1,.36,1) backwards;
  }
  .ex-card:nth-child(1){animation-delay:.03s}
  .ex-card:nth-child(2){animation-delay:.09s}
  .ex-card:nth-child(3){animation-delay:.15s}
  @keyframes cardIn{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:translateY(0)}}
  .ex-card:active{transform:scale(.975); box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .ex-icon{
    flex:0 0 auto; width:60px; height:60px; border-radius:17px;
    display:grid; place-items:center; background:var(--tint-bg);
    font-size:32px; line-height:1;
  }
  .ex-body{flex:1; min-width:0}
  .ex-name{font-size:19px; font-weight:700; letter-spacing:-.01em}
  .ex-meta{font-size:14px; color:var(--ink-dim); margin-top:4px}
  .ex-meta.ok{color:var(--gold); font-weight:600}
  .ex-chev{color:var(--ink-faint); font-size:22px; flex:0 0 auto}

  /* ---- ios grouped list ---- */
  .group{background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden; transition:background-color .3s, border-color .3s}
  .row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:13px 16px; border-bottom:1px solid var(--line); min-height:22px;
  }
  .row:last-child{border-bottom:0}
  .row .row-label{font-size:15px}
  .row .row-desc{font-size:12px; color:var(--ink-faint); margin-top:2px}
  .row.danger{cursor:pointer}
  .row.danger .row-label{color:var(--danger); font-weight:600}

  /* ---- toggle switch ---- */
  .switch{position:relative; width:51px; height:31px; flex:0 0 auto}
  .switch input{position:absolute; inset:0; opacity:0; margin:0; cursor:pointer; z-index:1}
  .switch .track{position:absolute; inset:0; background:var(--line); border-radius:999px; transition:background-color .25s}
  .switch .track::after{
    content:""; position:absolute; top:2px; left:2px; width:27px; height:27px;
    background:#fff; border-radius:50%; box-shadow:0 2px 5px rgba(0,0,0,.3); transition:transform .25s;
  }
  .switch input:checked + .track{background:var(--green)}
  .switch input:checked + .track::after{transform:translateX(20px)}

  /* ---- segmented ---- */
  .segmented{display:flex; gap:3px; background:var(--bg); border:1px solid var(--line); border-radius:10px; padding:3px}
  .segmented button{
    flex:1; background:none; border:0; color:var(--ink-dim); padding:8px 6px; cursor:pointer;
    font-family:inherit; font-size:13px; font-weight:600; border-radius:8px; transition:.15s;
  }
  .segmented button[aria-pressed="true"]{background:var(--surface); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.15)}

  .foot{margin-top:22px; padding:0 4px; font-size:12px; color:var(--ink-faint); line-height:1.8}

  /* ---- screens (tab content): quick fade-in, matching the reference app's tab switch ---- */
  .screen{display:none; padding:0 18px}
  .screen.active{display:block; animation:screenFade .2s ease-out}
  @keyframes screenFade{from{opacity:0} to{opacity:1}}

  /* ---- detail overlay: quick fade, matching the tab-switch motion ---- */
  .detail{
    position:fixed; inset:0; z-index:800; background:var(--bg);
    opacity:0;
    transition:opacity .2s ease-out, visibility 0s linear .2s;
    display:flex; flex-direction:column; visibility:hidden;
  }
  .detail.open{
    opacity:1; visibility:visible;
    transition:opacity .2s ease-out, visibility 0s linear 0s;
  }
  .detail-nav{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    padding:calc(env(safe-area-inset-top, 20px) + 8px) 6px 10px; border-bottom:1px solid var(--line);
    background:var(--surface); transition:background-color .3s, border-color .3s;
  }
  .detail-back{
    background:none; border:0; color:var(--tint); font-size:16px; font-weight:600;
    padding:8px 10px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:2px;
  }
  .detail-back:active{opacity:.5}
  .detail-title{font-size:16px; font-weight:800}
  .detail-spacer{width:64px}
  .detail-body{flex:1; overflow-y:auto; padding:16px 18px 40px}

  /* ---- stat cards ---- */
  .stat-row{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px}
  .stat-card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px 16px; transition:background-color .3s, border-color .3s}
  .stat-label{font-size:12px; color:var(--ink-faint); margin-bottom:6px}
  .stat-value{font-size:22px; font-weight:800; font-variant-numeric:tabular-nums}
  .stat-value .stat-unit{font-size:13px; font-weight:600; color:var(--ink-dim); margin-left:2px}
  .stat-value.gold{color:var(--gold)}
  .stat-value.muted{color:var(--ink-faint)}

  /* ---- record CTA + collapsible input ---- */
  .btn-record{
    width:100%; font-family:inherit; font-size:16px; font-weight:700;
    border:1px solid var(--line); background:var(--surface); color:var(--ink);
    padding:15px; border-radius:14px; cursor:pointer; margin:16px 0;
    transition:transform .15s, background-color .3s, border-color .3s;
  }
  .btn-record:active{transform:scale(.98)}
  .btn-record.on{background:var(--tint); border-color:var(--tint); color:#fff}
  .input-card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:16px;
    margin-bottom:16px; transition:background-color .3s, border-color .3s;
    animation:slideDown .28s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideDown{from{opacity:0; transform:translateY(-8px)} to{opacity:1; transform:translateY(0)}}
  .detail-target{font-size:13px; color:var(--ink-dim); margin-bottom:12px}
  .field-input{display:flex; align-items:center; gap:8px; justify-content:center; margin-bottom:14px}
  .field-input input{
    width:88px; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    font-family:inherit; font-size:24px; font-weight:700; text-align:center;
    font-variant-numeric:tabular-nums; border-radius:12px; padding:11px 4px; -moz-appearance:textfield;
    transition:background-color .3s, border-color .3s;
  }
  .field-input input::-webkit-outer-spin-button,.field-input input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .field-input input:focus-visible{outline:2px solid var(--tint); outline-offset:1px}
  .field-input .unit{font-size:14px; color:var(--ink-dim)}
  .field-input .colon{font-size:24px; color:var(--ink-dim)}
  .date-input{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--ink-dim);
    font-size:13px; border-radius:10px; padding:9px 10px; margin-bottom:12px;
    font-variant-numeric:tabular-nums; font-family:inherit; transition:background-color .3s, border-color .3s;
  }
  .btn{
    width:100%; font-family:inherit; font-size:16px; font-weight:700;
    border:0; background:var(--tint); color:#fff; padding:14px; border-radius:13px; cursor:pointer;
    transition:opacity .15s, transform .15s;
  }
  .btn:active{transform:scale(.98); opacity:.85}

  .graph-card{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:16px 14px; transition:background-color .3s, border-color .3s}
  .graph-card svg{width:100%; height:auto; display:block; overflow:visible}
  .graph-card svg text{font-family:inherit; font-variant-numeric:tabular-nums}
  .graph-empty{text-align:center; color:var(--ink-faint); font-size:13px; padding:30px 10px}

  /* ---- history list ---- */
  .history-row{
    display:flex; align-items:center; gap:10px; background:var(--surface);
    border:1px solid var(--line); border-radius:14px; padding:12px 14px; margin-bottom:9px;
    transition:background-color .3s, border-color .3s;
  }
  .history-date{font-size:12px; color:var(--ink-dim); flex:0 0 42px; font-variant-numeric:tabular-nums}
  .history-main{flex:1; min-width:0; font-size:14px}
  .history-main b{font-weight:700}
  .history-tag{color:var(--gold); font-weight:700; font-size:12px; margin-left:6px}
  .history-tag.sub{color:var(--ink-faint)}
  .history-actions{flex:0 0 auto; display:flex; gap:6px}
  .history-actions button{
    font-family:inherit; font-size:12px; font-weight:600; border-radius:8px; padding:6px 10px;
    border:1px solid var(--line); background:var(--bg); color:var(--ink-dim); cursor:pointer;
  }
  .history-actions button.del:active, .history-actions button.edit:active{opacity:.6}

  /* Note: intentionally NOT disabling animations under prefers-reduced-motion.
     Every motion in this app is a small opacity fade / <=14px slide — well
     under the threshold that accessibility guidance asks apps to remove —
     and a blanket kill-switch here previously made screen transitions look
     broken on devices with iOS "Reduce Motion" enabled. */

  /* ---- splash ---- */
  #splash{
    position:fixed; inset:0; z-index:9999; background:#3A4225;
    display:flex; align-items:flex-start; justify-content:center;
    transition:opacity .7s cubic-bezier(.4,0,.2,1);
  }
  #splash img{
    width:150px; height:150px; margin-top:32vh; animation:splash-in .9s cubic-bezier(.22,1,.36,1);
    filter:brightness(1.35) saturate(1.3) drop-shadow(0 0 26px rgba(244,182,27,.55));
  }
  #splash.hide{opacity:0; pointer-events:none}
  #splash.hide img{animation:splash-out .7s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes splash-in{0%{transform:scale(.72); opacity:0}55%{transform:scale(1.04); opacity:1}100%{transform:scale(1); opacity:1}}
  @keyframes splash-out{0%{transform:scale(1); opacity:1}100%{transform:scale(1.08); opacity:0}}

  /* ---- add-to-home-screen modal ---- */
  .modal-backdrop{
    position:fixed; inset:0; z-index:900; background:rgba(0,0,0,.45);
    display:flex; align-items:flex-end; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity .3s ease;
  }
  .modal-backdrop.open{opacity:1; pointer-events:auto}
  .modal-sheet{
    width:100%; max-width:480px; background:var(--surface); color:var(--ink);
    border-radius:20px 20px 0 0; padding:22px 20px calc(env(safe-area-inset-bottom,16px) + 20px);
    transform:translateY(100%); transition:transform .38s cubic-bezier(.32,.72,0,1);
    transition-delay:.02s;
  }
  .modal-backdrop.open .modal-sheet{transform:translateY(0)}
  .modal-title{font-size:18px; font-weight:800; margin-bottom:14px}
  .modal-body{font-size:14px; line-height:1.9; color:var(--ink-dim); margin-bottom:18px}
  .modal-body b{color:var(--ink); font-weight:700}
  .modal-body .step-group{margin-bottom:14px}
  .modal-body .step-group:last-child{margin-bottom:0}
  .modal-body .step-title{font-size:13px; font-weight:700; color:var(--tint); margin-bottom:4px}

  /* ---- flat bottom tab bar ---- */
  .tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:500;
    display:flex; background:var(--surface); border-top:1px solid var(--line);
    padding:10px 4px calc(env(safe-area-inset-bottom,10px) + 6px);
    transition:background-color .3s, border-color .3s;
  }
  .tabbar button{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:0; color:var(--ink-faint); cursor:pointer;
    padding:6px 4px; font-family:inherit; font-size:11px; font-weight:600; transition:.2s;
  }
  .tabbar button .tab-emoji{font-size:26px; line-height:1; filter:grayscale(1) opacity(.55); transition:filter .2s}
  .tabbar button.active{color:var(--tint)}
  .tabbar button.active .tab-emoji{filter:none}
  .tabbar button:active{transform:scale(.94)}
</style>
</head>
<body>
<div id="splash"><img src="splash-star.png" alt="특급전사"></div>
<div class="wrap">
<div class="screens-strip" id="screensStrip">

  <!-- ============ 기록 화면 ============ -->
  <section class="screen active" id="screen-record">
    <div class="page-header"><h1>기록</h1></div>
    <div id="exCards"></div>
  </section>

  <!-- ============ 설정 화면 ============ -->
  <section class="screen" id="screen-settings">
    <div class="page-header"><h1>설정</h1></div>

    <div class="group-label">기준</div>
    <div class="group">
      <div class="row" id="stdRow" style="cursor:pointer">
        <div>
          <div class="row-label">군종 · 연령 기준</div>
          <div class="row-desc" id="stdRowDesc">육군 · 만 25세 이하</div>
        </div>
        <span class="ex-chev">›</span>
      </div>
    </div>

    <div class="group-label">화면</div>
    <div class="group">
      <div class="row">
        <span class="row-label">다크 모드</span>
        <label class="switch">
          <input type="checkbox" id="darkToggle" aria-label="다크 모드">
          <span class="track"></span>
        </label>
      </div>
    </div>

    <div class="group-label">도움말</div>
    <div class="group">
      <div class="row" id="a2hsRow" style="cursor:pointer">
        <div>
          <div class="row-label">홈 화면에 추가하는 방법</div>
          <div class="row-desc">아이폰 · 갤럭시(안드로이드) 안내</div>
        </div>
        <span class="ex-chev">›</span>
      </div>
    </div>

    <div class="group-label">데이터</div>
    <div class="group">
      <div class="row danger" id="wipeBtn">
        <div>
          <div class="row-label">전체 기록 삭제</div>
          <div class="row-desc">저장된 모든 측정 기록을 이 기기에서 삭제합니다</div>
        </div>
      </div>
    </div>

    <p class="foot">
      기준 · 국군 체력검정 등급 (군종별 1~3급)<br>
      육군 3km · 해군 1.5km · 공군 2km 달리기<br>
      기록은 이 기기에만 저장됩니다 · v0.4
    </p>
  </section>

</div>
</div>

<!-- ============ 종목 상세 (슬라이드 화면) ============ -->
<div class="detail" id="detail">
  <div class="detail-nav">
    <button class="detail-back" id="detailBack">‹ 기록</button>
    <span class="detail-title" id="detailTitle">팔굽혀펴기</span>
    <div class="detail-spacer"></div>
  </div>
  <div class="detail-body">
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">최근 기록</div>
        <div class="stat-value" id="statLatest">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">현재 등급</div>
        <div class="stat-value" id="statGrade">—</div>
      </div>
    </div>

    <div class="graph-card">
      <svg id="detailGraph" viewBox="0 0 300 170" preserveAspectRatio="none" style="display:none"></svg>
      <div class="graph-empty" id="detailEmpty">아직 기록이 없습니다.<br>오늘의 첫 기록을 남겨보세요.</div>
    </div>

    <button class="btn-record" id="toggleInputBtn">+ 기록하기</button>

    <div class="input-card" id="inputCard" hidden>
      <div class="detail-target" id="detailTarget"></div>
      <input class="date-input" id="detailDate" type="date" aria-label="측정일">
      <div class="field-input" id="detailInputWrap"></div>
      <button class="btn" id="detailSaveBtn">기록 저장</button>
    </div>

    <div class="group-label">기록 히스토리</div>
    <div id="historyList"></div>
  </div>
</div>

<!-- ============ 기준 설정 (슬라이드 화면) ============ -->
<div class="detail" id="stdDetail">
  <div class="detail-nav">
    <button class="detail-back" id="stdBack">‹ 설정</button>
    <span class="detail-title">기준</span>
    <div class="detail-spacer"></div>
  </div>
  <div class="detail-body">
    <div class="group-label">군종</div>
    <div class="segmented" id="branchSeg" role="group" aria-label="군종 선택">
      <button data-branch="army" aria-pressed="true">육군</button>
      <button data-branch="navy" aria-pressed="false">해군</button>
      <button data-branch="airforce" aria-pressed="false">공군</button>
    </div>

    <div class="group-label">나이</div>
    <div class="segmented" id="ageSeg" role="group" aria-label="연령 선택">
      <button data-age="u25" aria-pressed="true">만 25세 이하</button>
      <button data-age="26to30" aria-pressed="false">만 26세 이상</button>
    </div>
  </div>
</div>

<!-- ============ 홈 화면 추가 안내 ============ -->
<div class="modal-backdrop" id="a2hsBackdrop">
  <div class="modal-sheet">
    <div class="modal-title">📲 홈 화면에 추가하기</div>
    <div class="modal-body" id="a2hsBody"></div>
    <button class="btn" id="a2hsClose">확인했어요</button>
  </div>
</div>

<nav class="tabbar" id="tabbar" role="tablist" aria-label="화면 전환">
  <button data-tab="record" class="active" role="tab" aria-selected="true">
    <span class="tab-emoji">📋</span>
    기록
  </button>
  <button data-tab="settings" role="tab" aria-selected="false">
    <span class="tab-emoji">⚙️</span>
    설정
  </button>
</nav>

<script>
(function(){
  "use strict";
  var STORE="teukup_records_v1", AGEKEY="teukup_age_v1", BRANCHKEY="teukup_branch_v1", THEMEKEY="teukup_theme_v1", TABKEY="teukup_tab_v2";

  // 국군 체력검정 등급 기준 (군종별)
  // grades = [1급 컷, 2급 컷, 3급 컷]. 반복종목은 이상, 달리기(초)는 이하.
  var STD={
    army:{ label:"육군", runDist:"3km",
      push:[72,66,60], sit:[82,76,70], run:[750,810,870] },        // 12:30 / 13:30 / 14:30
    navy:{ label:"해군", runDist:"1.5km",
      push:[70,60,50], sit:[80,70,60], run:[435,465,510] },        // 7:15 / 7:45 / 8:30
    airforce:{ label:"공군", runDist:"2km",
      push:[68,60,52], sit:[78,70,62], run:[510,540,570] }         // 8:30 / 9:00 / 9:30
  };

  var EXES={
    push:{name:"팔굽혀펴기", emoji:"💪", unit:"개", isTime:false},
    sit:{name:"윗몸일으키기", emoji:"🔥", unit:"개", isTime:false},
    run:{name:"달리기", emoji:"🏃", unit:"", isTime:true}
  };

  var branch = localStorage.getItem(BRANCHKEY) || "army";
  var age = localStorage.getItem(AGEKEY) || "u25";
  var records = load();
  var currentDetailKey = null;

  var $=function(id){return document.getElementById(id)};
  function load(){ try{return JSON.parse(localStorage.getItem(STORE))||[]}catch(e){return[]} }
  function persist(){ localStorage.setItem(STORE, JSON.stringify(records)) }
  function fmtRun(s){ if(s==null||isNaN(s))return "—"; var m=Math.floor(s/60), r=s%60; return m+":"+(r<10?"0":"")+r; }
  function today(){ return new Date().toISOString().slice(0,10) }

  // ---- standards / grading ----
  function exName(key){ return key==="run" ? STD[branch].runDist+" 달리기" : EXES[key].name; }
  function cuts(key){ return STD[branch][key]; }
  function topCut(key){ return cuts(key)[0]; }   // 1급 기준
  function gradeOf(key, val){                     // 1/2/3급 or 0(미달)
    var g=cuts(key);
    if(EXES[key].isTime){
      if(val<=g[0]) return 1; if(val<=g[1]) return 2; if(val<=g[2]) return 3; return 0;
    }
    if(val>=g[0]) return 1; if(val>=g[1]) return 2; if(val>=g[2]) return 3; return 0;
  }
  function gradeLabel(gr){ return gr===0 ? "미달" : gr+"급"; }
  function passes(key, val){ return gradeOf(key, val)===1; }  // 1급 = 최고 등급

  // ---- theme ----
  function applyTheme(t){
    document.documentElement.setAttribute("data-theme", t);
    $("darkToggle").checked = (t==="dark");
  }
  applyTheme(localStorage.getItem(THEMEKEY) || "light");
  $("darkToggle").addEventListener("change", function(){
    var t = this.checked ? "dark" : "light";
    localStorage.setItem(THEMEKEY, t);
    applyTheme(t);
  });

  // ---- exercise cards ----
  function latestValue(key){
    var withVal = records.filter(function(r){ return typeof r[key]==="number"; });
    if(!withVal.length) return null;
    withVal.sort(function(a,b){ return (b.date||"").localeCompare(a.date||""); });
    return withVal[0];
  }
  function renderCards(){
    var box=$("exCards");
    box.innerHTML = Object.keys(EXES).map(function(key){
      var ex=EXES[key], rec=latestValue(key);
      var meta, ok=false;
      if(rec){
        var val=rec[key], gr=gradeOf(key,val);
        ok=(gr===1);
        meta=(ex.isTime?fmtRun(val):val+ex.unit)+" · "+gradeLabel(gr);
      }else{
        meta="아직 기록이 없습니다";
      }
      return '<button class="ex-card" data-ex="'+key+'">'
        +'<div class="ex-icon">'+ex.emoji+'</div>'
        +'<div class="ex-body"><div class="ex-name">'+exName(key)+'</div><div class="ex-meta'+(ok?' ok':'')+'">'+meta+'</div></div>'
        +'<div class="ex-chev">›</div>'
      +'</button>';
    }).join("");
    Array.prototype.forEach.call(box.querySelectorAll(".ex-card"), function(b){
      b.addEventListener("click", function(){ openDetail(b.getAttribute("data-ex")); });
    });
  }

  // ---- detail screen ----
  function targetText(key){
    var v=topCut(key);
    return EXES[key].isTime ? "1급 기준 "+fmtRun(v)+" 이내" : "1급 기준 "+v+"개";
  }
  function buildInput(key, presetVal){
    var ex=EXES[key], wrap=$("detailInputWrap");
    if(ex.isTime){
      var mm=presetVal!=null?Math.floor(presetVal/60):"", ss=presetVal!=null?presetVal%60:"";
      wrap.innerHTML =
        '<input id="dIn1" type="number" inputmode="numeric" min="0" placeholder="00" aria-label="분" value="'+mm+'">'
        +'<span class="colon">:</span>'
        +'<input id="dIn2" type="number" inputmode="numeric" min="0" max="59" placeholder="00" aria-label="초" value="'+ss+'">';
    }else{
      wrap.innerHTML = '<input id="dIn1" type="number" inputmode="numeric" min="0" placeholder="0" aria-label="'+ex.name+' 값" value="'+(presetVal!=null?presetVal:"")+'"><span class="unit">'+ex.unit+'</span>';
    }
  }
  function readInputValue(key){
    var ex=EXES[key];
    if(ex.isTime){
      var mm=parseInt($("dIn1").value,10), ss=parseInt($("dIn2").value,10);
      if(isNaN(mm)&&isNaN(ss)) return NaN;
      return (isNaN(mm)?0:mm)*60+(isNaN(ss)?0:ss);
    }
    return parseInt($("dIn1").value,10);
  }

  function showInputCard(presetDate, presetVal){
    $("detailDate").value=presetDate || today();
    buildInput(currentDetailKey, presetVal);
    $("inputCard").hidden=false;
    $("toggleInputBtn").classList.add("on");
    $("toggleInputBtn").textContent="입력 취소";
    $("inputCard").scrollIntoView({behavior:"smooth", block:"nearest"});
  }
  function hideInputCard(){
    $("inputCard").hidden=true;
    $("toggleInputBtn").classList.remove("on");
    $("toggleInputBtn").textContent="+ 기록하기";
  }
  $("toggleInputBtn").addEventListener("click", function(){
    if($("inputCard").hidden) showInputCard(); else hideInputCard();
  });

  function openDetail(key){
    currentDetailKey=key;
    var ex=EXES[key];
    $("detailTitle").textContent=ex.emoji+" "+exName(key);
    $("detailTarget").textContent=targetText(key);
    hideInputCard();
    renderStats(key);
    drawGraph(key);
    renderHistory(key);
    $("detail").classList.add("open");
  }
  function closeDetail(){
    $("detail").classList.remove("open");
  }
  $("detailBack").addEventListener("click", closeDetail);

  function refreshDetail(key){
    renderCards();
    renderStats(key);
    drawGraph(key);
    renderHistory(key);
  }

  $("detailSaveBtn").addEventListener("click", function(){
    var key=currentDetailKey, val=readInputValue(key);
    if(isNaN(val)){ alert("값을 입력해야 저장됩니다."); return; }
    var dateStr=$("detailDate").value || today();
    var rec = records.filter(function(r){ return r.date===dateStr; })[0];
    if(!rec){ rec={id:Date.now(), date:dateStr}; records.push(rec); }
    rec[key]=val; rec.age=age;
    persist();
    hideInputCard();
    refreshDetail(key);
  });

  // ---- stats ----
  function renderStats(key){
    var ex=EXES[key], rec=latestValue(key);
    var latestEl=$("statLatest"), gradeEl=$("statGrade");
    if(!rec){
      latestEl.textContent="—"; latestEl.className="stat-value muted";
      gradeEl.textContent="—"; gradeEl.className="stat-value muted";
      return;
    }
    var val=rec[key], gr=gradeOf(key,val);
    latestEl.textContent = ex.isTime ? fmtRun(val) : val+ex.unit;
    latestEl.className="stat-value";
    gradeEl.textContent=gradeLabel(gr);
    gradeEl.className="stat-value"+(gr===1?" gold":(gr===0?" muted":""));
  }

  // ---- history ----
  function renderHistory(key){
    var ex=EXES[key];
    var box=$("historyList");
    var pts = records.filter(function(r){ return typeof r[key]==="number"; })
      .sort(function(a,b){ return (b.date||"").localeCompare(a.date||""); });
    if(!pts.length){
      box.innerHTML='<div class="graph-empty">기록 히스토리가 없습니다.</div>';
      return;
    }
    box.innerHTML = pts.map(function(r){
      var val=r[key], gr=gradeOf(key,val);
      var tag = gr===0 ? '' : '<span class="history-tag'+(gr===1?'':' sub')+'">'+gradeLabel(gr)+'</span>';
      return '<div class="history-row">'
        +'<div class="history-date">'+shortDate(r.date)+'</div>'
        +'<div class="history-main">'+(ex.isTime?fmtRun(val):val+ex.unit)+tag+'</div>'
        +'<div class="history-actions">'
          +'<button class="edit" data-date="'+r.date+'">수정</button>'
          +'<button class="del" data-date="'+r.date+'">삭제</button>'
        +'</div>'
      +'</div>';
    }).join("");
    Array.prototype.forEach.call(box.querySelectorAll(".edit"), function(b){
      b.addEventListener("click", function(){
        var d=b.getAttribute("data-date");
        var rec=records.filter(function(r){ return r.date===d; })[0];
        if(!rec) return;
        showInputCard(d, rec[key]);
      });
    });
    Array.prototype.forEach.call(box.querySelectorAll(".del"), function(b){
      b.addEventListener("click", function(){
        var d=b.getAttribute("data-date");
        if(!confirm(d+" 기록을 삭제할까요?")) return;
        var rec=records.filter(function(r){ return r.date===d; })[0];
        if(!rec) return;
        delete rec[key];
        var hasAny=["push","sit","run"].some(function(k){ return typeof rec[k]==="number"; });
        if(!hasAny){ records=records.filter(function(r){ return r!==rec; }); }
        persist();
        refreshDetail(key);
      });
    });
  }

  // ---- graph ----
  function niceNum(range, round){
    var exponent=Math.floor(Math.log(range)/Math.LN10);
    var fraction=range/Math.pow(10,exponent), niceFraction;
    if(round){
      if(fraction<1.5) niceFraction=1;
      else if(fraction<3) niceFraction=2;
      else if(fraction<7) niceFraction=5;
      else niceFraction=10;
    }else{
      if(fraction<=1) niceFraction=1;
      else if(fraction<=2) niceFraction=2;
      else if(fraction<=5) niceFraction=5;
      else niceFraction=10;
    }
    return niceFraction*Math.pow(10,exponent);
  }
  function niceScale(min,max,maxTicks){
    var range=niceNum(Math.max(max-min,1e-6), false);
    var step=niceNum(range/(maxTicks-1), true);
    var niceMin=Math.floor(min/step)*step, niceMax=Math.ceil(max/step)*step;
    var ticks=[];
    for(var v=niceMin; v<=niceMax+step*1e-6; v+=step) ticks.push(Math.round(v*1000)/1000);
    return {min:niceMin, max:niceMax, ticks:ticks};
  }
  function shortDate(d){ return d ? d.slice(5).replace("-","/") : ""; }

  function drawGraph(key){
    var ex=EXES[key];
    var pts = records.filter(function(r){ return typeof r[key]==="number"; })
      .sort(function(a,b){ return (a.date||"").localeCompare(b.date||""); });
    var svg=$("detailGraph"), empty=$("detailEmpty");

    if(!pts.length){
      svg.style.display="none"; empty.style.display="block";
      return;
    }
    empty.style.display="none"; svg.style.display="block";

    var target=topCut(key);
    var values=pts.map(function(p){ return p[key]; });
    var lower=ex.isTime;
    var allVals=values.concat([target]);
    var rawMin=Math.min.apply(null, allVals), rawMax=Math.max.apply(null, allVals);
    var scale=niceScale(rawMin, rawMax, 5);
    var min=scale.min, max=scale.max;

    var W=300,H=170,padL=32,padR=10,padT=20,padB=22;
    function xAt(i){ return pts.length===1 ? padL+(W-padL-padR)/2 : padL + (i/(pts.length-1))*(W-padL-padR); }
    function yAt(v){
      var t=(v-min)/((max-min)||1);
      if(lower) t=1-t;
      return H-padB-t*(H-padT-padB);
    }
    function fmtTick(v){ return ex.isTime ? fmtRun(v) : (Math.round(v*10)/10); }

    var grid = scale.ticks.map(function(t){
      var y=yAt(t).toFixed(1);
      return '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="var(--line)" stroke-width="1"/>'
        +'<text x="'+(padL-6)+'" y="'+y+'" text-anchor="end" dominant-baseline="middle" font-size="8.5" fill="var(--ink-faint)">'+fmtTick(t)+'</text>';
    }).join("");

    var linePath = pts.map(function(p,i){ return (i===0?"M":"L")+xAt(i).toFixed(1)+" "+yAt(values[i]).toFixed(1); }).join(" ");
    var targetY=yAt(target).toFixed(1);

    var step = pts.length>6 ? Math.ceil(pts.length/6) : 1;
    var dots="", valueLabels="", dateLabels="";
    pts.forEach(function(p,i){
      var ok = lower ? values[i]<=target : values[i]>=target;
      var x=xAt(i).toFixed(1), y=yAt(values[i]).toFixed(1);
      var color = ok?"var(--gold)":"var(--tint)";
      dots += '<circle cx="'+x+'" cy="'+y+'" r="3.6" fill="'+color+'"/>';
      valueLabels += '<text x="'+x+'" y="'+(parseFloat(y)-8)+'" text-anchor="middle" font-size="10" font-weight="700" fill="'+color+'">'+(ex.isTime?fmtRun(values[i]):values[i])+'</text>';
      if(i%step===0 || i===pts.length-1){
        dateLabels += '<text x="'+x+'" y="'+(H-6)+'" text-anchor="middle" font-size="8.5" fill="var(--ink-faint)">'+shortDate(p.date)+'</text>';
      }
    });

    svg.innerHTML = grid
      +'<line x1="'+padL+'" y1="'+targetY+'" x2="'+(W-padR)+'" y2="'+targetY+'" stroke="var(--gold)" stroke-width="1.2" stroke-dasharray="4 4" opacity=".8"/>'
      +'<path d="'+linePath+'" fill="none" stroke="var(--tint)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>'
      +dots+valueLabels+dateLabels;
  }

  // ---- settings: refresh everything after standard change ----
  function ageLabel(a){ return a==="u25" ? "만 25세 이하" : "만 26세 이상"; }
  function updateStdRowDesc(){
    $("stdRowDesc").textContent = STD[branch].label+" · "+ageLabel(age);
  }
  function onStandardChange(){
    updateStdRowDesc();
    renderCards();
    if(currentDetailKey){
      $("detailTitle").textContent=EXES[currentDetailKey].emoji+" "+exName(currentDetailKey);
      $("detailTarget").textContent=targetText(currentDetailKey);
      renderStats(currentDetailKey);
      drawGraph(currentDetailKey);
      renderHistory(currentDetailKey);
    }
  }

  // ---- settings: 기준 sub-page ----
  $("stdRow").addEventListener("click", function(){ $("stdDetail").classList.add("open"); });
  $("stdBack").addEventListener("click", function(){ $("stdDetail").classList.remove("open"); });

  // ---- settings: branch ----
  Array.prototype.forEach.call($("branchSeg").querySelectorAll("button"), function(b){
    b.addEventListener("click", function(){
      branch=b.getAttribute("data-branch"); localStorage.setItem(BRANCHKEY, branch);
      Array.prototype.forEach.call($("branchSeg").querySelectorAll("button"), function(x){
        x.setAttribute("aria-pressed", x===b?"true":"false");
      });
      onStandardChange();
    });
  });
  Array.prototype.forEach.call($("branchSeg").querySelectorAll("button"), function(x){
    x.setAttribute("aria-pressed", x.getAttribute("data-branch")===branch?"true":"false");
  });

  // ---- settings: age ----
  Array.prototype.forEach.call($("ageSeg").querySelectorAll("button"), function(b){
    b.addEventListener("click", function(){
      age=b.getAttribute("data-age"); localStorage.setItem(AGEKEY, age);
      Array.prototype.forEach.call($("ageSeg").querySelectorAll("button"), function(x){
        x.setAttribute("aria-pressed", x===b?"true":"false");
      });
      onStandardChange();
    });
  });
  Array.prototype.forEach.call($("ageSeg").querySelectorAll("button"), function(x){
    x.setAttribute("aria-pressed", x.getAttribute("data-age")===age?"true":"false");
  });
  updateStdRowDesc();

  // ---- settings: wipe data ----
  $("wipeBtn").addEventListener("click", function(){
    if(!records.length) return;
    if(confirm("저장된 모든 기록을 삭제할까요? 이 작업은 되돌릴 수 없습니다.")){
      records=[]; persist(); renderCards();
      if(currentDetailKey) drawGraph(currentDetailKey);
    }
  });

  // ---- add-to-home-screen guide ----
  var A2HSKEY="teukup_a2hs_seen_v1";
  var ua=navigator.userAgent;
  var isIOS=/iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid=/Android/.test(ua);
  var isStandalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone===true;

  function a2hsContent(){
    var ios='<div class="step-group"><div class="step-title">아이폰 (Safari)</div>하단 공유 버튼 <b>⬆️</b>를 탭하고<br><b>"홈 화면에 추가"</b>를 선택한 뒤 <b>추가</b>를 누르세요.</div>';
    var android='<div class="step-group"><div class="step-title">갤럭시 / 안드로이드 (Chrome)</div>우측 상단 점 3개 메뉴 <b>⋮</b>를 탭하고<br><b>"홈 화면에 추가"</b> 또는 <b>"앱 설치"</b>를 선택하세요.</div>';
    if(isIOS) return ios;
    if(isAndroid) return android;
    return ios+android;
  }
  function openA2HS(){
    $("a2hsBody").innerHTML=a2hsContent();
    $("a2hsBackdrop").classList.add("open");
  }
  function closeA2HS(){
    $("a2hsBackdrop").classList.remove("open");
    localStorage.setItem(A2HSKEY, "1");
  }
  $("a2hsRow").addEventListener("click", openA2HS);
  $("a2hsClose").addEventListener("click", closeA2HS);
  $("a2hsBackdrop").addEventListener("click", function(e){ if(e.target===$("a2hsBackdrop")) closeA2HS(); });

  if(!isStandalone && !localStorage.getItem(A2HSKEY)){
    setTimeout(openA2HS, 3000);
  }

  // ---- tab switching: quick fade-in on the incoming screen ----
  function setTab(name){
    Array.prototype.forEach.call(document.querySelectorAll(".screen"), function(p){
      var isTarget=p.id==="screen-"+name;
      p.classList.remove("active");
      if(isTarget){
        void p.offsetWidth; // restart the fade-in animation every visit
        p.classList.add("active");
      }
    });
    Array.prototype.forEach.call($("tabbar").querySelectorAll("button"), function(b){
      var on=b.getAttribute("data-tab")===name;
      b.classList.toggle("active", on);
      b.setAttribute("aria-selected", on?"true":"false");
    });
    localStorage.setItem(TABKEY, name);
  }
  Array.prototype.forEach.call($("tabbar").querySelectorAll("button"), function(b){
    b.addEventListener("click", function(){ setTab(b.getAttribute("data-tab")); });
  });

  // ---- init ----
  renderCards();
  setTab(localStorage.getItem(TABKEY) || "record");

  // ---- splash screen ----
  setTimeout(function(){
    var splash=$("splash");
    splash.classList.add("hide");
    splash.addEventListener("transitionend", function(){ splash.remove(); }, {once:true});
  }, 2600);
})();

// ---- service worker: keep the home-screen app auto-updating ----
(function(){
  if(!("serviceWorker" in navigator)) return;
  var refreshed=false;
  navigator.serviceWorker.addEventListener("controllerchange", function(){
    if(refreshed) return; refreshed=true;
    window.location.reload();
  });
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").then(function(reg){
      document.addEventListener("visibilitychange", function(){
        if(document.visibilityState==="visible") reg.update();
      });
      window.addEventListener("pageshow", function(){ reg.update(); });
    });
  });
})();
</script>
</body>
</html>
